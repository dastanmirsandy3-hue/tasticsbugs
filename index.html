<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TASTICS BUGS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:black;
    color:#00ff00;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* LOGIN */

#loginBox{
    width:90%;
    max-width:350px;
    border:3px solid #00ff00;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px #00ff00;
}

#loginBox h1{
    margin-bottom:20px;
    text-shadow:0 0 10px #00ff00;
}

#loginBox input{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    border:2px solid #00ff00;
    background:black;
    color:#00ff00;
    font-size:18px;
}

#loginBox button{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid #00ff00;
    background:black;
    color:#00ff00;
    font-size:18px;
    cursor:pointer;
}

/* MENU */

#mainBox{
    display:none;
    width:90%;
    max-width:400px;
    border:3px solid #00ff00;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px #00ff00;
}

#mainBox h1{
    font-size:35px;
    text-shadow:0 0 15px #00ff00;
}

.sub{
    color:white;
    font-size:14px;
    margin-bottom:25px;
}

#mainBox input,
#mainBox select{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
    border:2px solid #00ff00;
    background:black;
    color:#00ff00;
    font-size:18px;
}

#mainBox button{
    width:100%;
    padding:15px;
    border-radius:10px;
    border:2px solid #00ff00;
    background:black;
    color:#00ff00;
    font-size:18px;
    cursor:pointer;
}

#hasil{
    margin-top:25px;
    display:none;
    border:2px solid #00ff00;
    border-radius:15px;
    padding:20px;
}

.circle{
    width:70px;
    height:70px;
    border-radius:50%;
    border:4px solid #00ff00;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:40px;
    margin-bottom:15px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox">

<h1>LOGIN</h1>

<input type="password" id="password" placeholder="Masukkan Password">

<button onclick="login()">ENTER</button>

</div>

<!-- MENU UTAMA -->

<div id="mainBox">

<h1>TASTICS BUGS</h1>

<p class="sub">web bug by tann</p>

<input type="text" id="nomor" placeholder="Nomor Target">

<select>
<option>CRASH ANDROID</option>
<option>CRASH INVISIBLE</option>
<option>DELAY MAKER</option>
</select>

<button onclick="mulai()">START ATTACK</button>

<div id="hasil">

<div class="circle">
✔
</div>

<p id="textHasil"></p>

</div>

</div>

<script>

/* PASSWORD */

function login(){

var pw = document.getElementById("password").value;

if(pw == "tan123"){

document.getElementById("loginBox").style.display = "none";

document.getElementById("mainBox").style.display = "block";

}else{

alert("Password Salah");

}

}

/* BUTTON */

function mulai(){

var nomor = document.getElementById("nomor").value;

document.getElementById("hasil").style.display = "block";

document.getElementById("textHasil").innerHTML =
nomor + " (success)";

}

</script>

</body>
</html>
